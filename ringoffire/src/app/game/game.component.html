<app-player class="player-position" style="top: 130px"></app-player>

<div class="field">
    <div class="card-stack">
        <!-- Card Stack -->
        <img [ngStyle]="{'right.px': i * 4}" *ngFor="let c of [0,1,2,3]; let i = index;"
            src="assets/img/cards/card_cover.png" alt="">

        <img (click)="takeCard()" class="top-card" style="right: 25px" src="assets/img/cards/card_cover.png">

        <!-- Stack for played cards -->
        <img class="played-card" ngFor="let card of game.playedCards" src="/assets/img/cards/{{ playedCard }}.png"
            alt="">

        <!-- Current card (Animation) -->
        <img (click)="takeCard()" *ngIf="pickCardAnimation" class="pick-card" style="right: 25px"
            src="assets/img/cards/{{ currentCard }}.png">
    </div>
</div>
